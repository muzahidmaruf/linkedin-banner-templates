<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get 20 Free LinkedIn Banner Templates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            padding: 48px 32px 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            line-height: 1.4;
            color: #333;
            font-weight: 700;
        }

        .form-section {
            background: #f0f0f0;
            padding: 32px;
            text-align: center;
        }

        .form-section p {
            color: #555;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-row {
            display: flex;
            gap: 12px;
            max-width: 440px;
            margin: 0 auto;
        }

        .form-row input[type="email"] {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
        }

        .form-row input[type="email"]:focus {
            border-color: #e6602b;
        }

        .form-row button {
            padding: 12px 24px;
            background: #e6602b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .form-row button:hover {
            background: #d45524;
        }

        .form-row button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #555;
            min-height: 1.2em;
        }

        .footer-note {
            padding: 16px 32px 24px;
            text-align: center;
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Get My 20 Editable LinkedIn Banner Templates To Turn Your Profile Into A Lead Machine</h1>
        </div>
        <div class="form-section">
            <p>Drop your best email below to get instant access to the templates:</p>
            <form id="subscribe-form" class="form-row">
                <input type="email" id="email" placeholder="Email Address" required>
                <button type="submit" id="submit-btn">Get Instant Access</button>
            </form>
            <p id="status-msg"></p>
        </div>
        <div class="footer-note">
            We respect your privacy. Unsubscribe at any time.
        </div>
    </div>

    <!-- Hidden form + iframe to submit to Substack in the background -->
    <form id="ss-form" action="https://muzahidmaruf.substack.com/subscribe" method="POST" target="ss-hidden" style="display:none;">
        <input type="hidden" name="email" id="ss-email">
    </form>
    <iframe name="ss-hidden" style="display:none;"></iframe>

    <script>
        (function() {
            var figmaUrl = 'https://www.figma.com/design/AbLEAxckssvQT7tuJ64Bpz/Free-Banner?node-id=0-1&t=ISOezaG9g5bhcMve-1';
            var form = document.getElementById('subscribe-form');
            var btn = document.getElementById('submit-btn');
            var emailInput = document.getElementById('email');
            var statusMsg = document.getElementById('status-msg');
            var ssForm = document.getElementById('ss-form');
            var ssEmail = document.getElementById('ss-email');
            var redirected = false;

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var email = emailInput.value.trim();
                if (!email) return;

                btn.disabled = true;
                var countdown = 3;
                statusMsg.textContent = 'Subscribing... Redirecting in ' + countdown + 's';

                // Attempt 1: Background fetch to Substack API (silent, no-cors)
                try {
                    fetch('https://muzahidmaruf.substack.com/api/v1/free', {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, publication_id: 'muzahidmaruf' })
                    });
                } catch (err) {
                    // Silent fail
                }

                // Attempt 2: Hidden iframe form submission
                ssEmail.value = email;
                ssForm.submit();

                // 3-second countdown then redirect
                var timer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        if (!redirected) {
                            redirected = true;
                            window.location.href = figmaUrl;
                        }
                    } else {
                        statusMsg.textContent = 'Subscribing... Redirecting in ' + countdown + 's';
                    }
                }, 1000);
            });
        })();
    </script>
</body>
</html>
