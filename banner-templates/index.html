<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get 20 Free LinkedIn Banner Templates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            padding: 48px 32px 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            line-height: 1.4;
            color: #333;
            font-weight: 700;
        }

        .embed-section {
            background: #f0f0f0;
            padding: 32px;
            text-align: center;
        }

        .embed-section p {
            color: #555;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .substack-embed {
            display: flex;
            justify-content: center;
        }

        .substack-embed iframe {
            border-radius: 4px;
        }

        .footer-note {
            padding: 16px 32px 24px;
            text-align: center;
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Get My 20 Editable LinkedIn Banner Templates To Turn Your Profile Into A Lead Machine</h1>
        </div>
        <div class="embed-section">
            <p id="step-text">Drop your best email below to get instant access to the templates:</p>
            <div class="substack-embed">
                <iframe
                    id="substack-iframe"
                    src="https://muzahidmaruf.substack.com/embed"
                    width="480"
                    height="320"
                    style="border:1px solid #EEE; background:white;"
                    frameborder="0"
                    scrolling="no"
                    sandbox="allow-forms allow-scripts allow-same-origin">
                </iframe>
            </div>
        </div>
        <div class="footer-note">
            We respect your privacy. Unsubscribe at any time.
        </div>
    </div>

    <script>
        (function() {
            var iframe = document.getElementById('substack-iframe');
            var stepText = document.getElementById('step-text');
            var figmaUrl = 'https://www.figma.com/design/AbLEAxckssvQT7tuJ64Bpz/Free-Banner?node-id=0-1&t=ISOezaG9g5bhcMve-1';
            var redirected = false;
            var countdownStarted = false;
            var loadCount = 0;
            var timer = null;

            function redirect() {
                if (redirected) return;
                redirected = true;
                clearInterval(timer);
                window.location.href = figmaUrl;
            }

            function startCountdown() {
                if (countdownStarted || redirected) return;
                countdownStarted = true;
                var countdown = 3;
                stepText.textContent = 'Subscribing... Redirecting in ' + countdown + 's';
                timer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        redirect();
                    } else {
                        stepText.textContent = 'Subscribing... Redirecting in ' + countdown + 's';
                    }
                }, 1000);
            }

            // 1. Detect iframe reload (form submitted and response loaded inside iframe)
            iframe.addEventListener('load', function() {
                loadCount++;
                if (loadCount >= 2) {
                    // Form response loaded inside iframe
                    startCountdown();
                }
            });

            // 2. Detect user clicking inside the iframe via window blur
            window.addEventListener('blur', function() {
                if (!countdownStarted) {
                    startCountdown();
                }
            });

            // 3. Detect iframe becoming the active element
            var activeCheck = setInterval(function() {
                if (document.activeElement === iframe) {
                    clearInterval(activeCheck);
                    if (!countdownStarted) {
                        startCountdown();
                    }
                }
            }, 200);
        })();
    </script>
</body>
</html>
